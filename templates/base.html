<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>{% block title %}{% endblock %} · nanvel.com</title>
    {% block meta %}{% endblock %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link type="text/css" href="/style.css" rel="stylesheet"/>
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico"/>
  </head>
  <body class="bg-white text-slate-900 antialiased min-h-screen flex flex-col">
    <header class="sticky top-0 z-10 border-b border-slate-100 bg-white/95 backdrop-blur-sm">
      <div class="mx-auto max-w-4xl px-4 sm:px-6 flex h-14 items-center justify-between">
        <a href="/" class="font-bold text-slate-900 hover:text-indigo-600 transition-colors text-lg tracking-tight">NANVEL</a>
        <nav class="flex items-center gap-5 text-sm">
          <a href="/" class="text-slate-500 hover:text-slate-900 transition-colors">Posts</a>
          <a href="/tags/projects/" class="text-slate-500 hover:text-slate-900 transition-colors">Projects</a>
          <a href="/pages/oleksandr-polieno/" class="text-slate-500 hover:text-slate-900 transition-colors">About</a>
        </nav>
      </div>
    </header>
    <main class="flex-1">
      <div class="mx-auto max-w-4xl px-4 sm:px-6 py-10">
        {% block body %}{% endblock %}
      </div>
    </main>
    <footer class="border-t border-slate-100 mt-8">
      <div class="mx-auto max-w-4xl px-4 sm:px-6 py-6 flex items-center justify-between text-sm text-slate-400">
        <span>&copy; 2011–{{ year }} <a href="/pages/oleksandr-polieno/" class="hover:text-slate-600 transition-colors">Oleksandr Polieno</a></span>
        <a href="https://github.com/nanvel/blog" target="_blank" class="hover:text-slate-600 transition-colors">Source</a>
      </div>
    </footer>
  </body>
</html>
