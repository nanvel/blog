{% extends 'base.html' %}

{% block title %}Writing{% endblock %}

{% block body %}
<div class="lg:grid lg:grid-cols-[1fr_200px] lg:gap-14">
  <div>
    <h1 class="text-2xl font-bold text-slate-900 mb-8 tracking-tight">Writing</h1>
    <ul class="divide-y divide-slate-100">
      {% for page in pages %}
      <li class="py-3.5">
        <a href="/{{ page.uri }}/" class="group flex items-baseline justify-between gap-4">
          <span class="text-slate-800 group-hover:text-indigo-600 transition-colors font-medium leading-snug">{{ page.title }}</span>
          <span class="shrink-0 text-sm text-slate-400 tabular-nums">{{ page.created.strftime('%b %Y') }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
  <aside class="mt-12 lg:mt-0">
    <h2 class="text-xs font-semibold uppercase tracking-widest text-slate-400 mb-4">Topics</h2>
    <div class="flex flex-wrap gap-1.5">
      {% for tag in all_tags %}
      <a href="/tags/{{ tag }}/" class="px-2.5 py-1 text-xs rounded-full bg-slate-100 text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-colors">{{ tag | replace('-', ' ') }}</a>
      {% endfor %}
    </div>
  </aside>
</div>
{% endblock %}
